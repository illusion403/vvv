name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'vvv-proj/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./vvv-proj
      run: npm ci
      
    - name: Run linting
      working-directory: ./vvv-proj
      run: npm run lint
      
    - name: Check formatting
      working-directory: ./vvv-proj
      run: npx prettier --check src/

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'vvv-proj/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./vvv-proj
      run: npm ci
      
    - name: Type check
      working-directory: ./vvv-proj
      run: npm run type-check

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'vvv-proj/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./vvv-proj
      run: npm ci
      
    - name: Run unit tests
      working-directory: ./vvv-proj
      run: npm run test:unit

  e2e-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'vvv-proj/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./vvv-proj
      run: npm ci
      
    - name: Setup Cypress
      working-directory: ./vvv-proj
      run: npm run prepare
      
    - name: Build application
      working-directory: ./vvv-proj
      run: npm run build
      
    - name: Run E2E tests
      working-directory: ./vvv-proj
      run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'vvv-proj/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./vvv-proj
      run: npm ci
      
    - name: Build application
      working-directory: ./vvv-proj
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: vvv-proj/dist/
        retention-days: 1
